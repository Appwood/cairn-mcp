version: 2
updates:
  # Python dependencies declared in pyproject.toml (and uv.lock).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    # Supply-chain hardening: wait before opening PRs for brand-new releases so a
    # compromised version has time to be detected and yanked. Security updates are
    # exempt and still come through immediately.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      # One PR per week for non-major bumps keeps the noise down.
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Supply-chain hardening (same rationale as above); also guards against a
    # compromised third-party action, e.g. the tj-actions/changed-files incident.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"
