version: 2
updates:
  # Python dependencies declared in pyproject.toml (and uv.lock).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      # One PR per week for non-major bumps keeps the noise down.
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"
