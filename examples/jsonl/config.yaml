# Demo configuration for the JSONL backend.
#
# NOTE: the companion logs.jsonl deliberately embeds FAKE, secret-looking values
# (a token, an api_key, a bearer token) so the example demonstrates redaction.
# They are not real credentials, and are chosen not to match real secret-scanner
# provider patterns (no real Stripe/AWS/GitHub key prefixes), so publishing never
# trips GitHub push protection.

default_time_window: 24h
max_results: 100

redaction:
  redact_emails: false
  fields:
    - password
    - token
    - api_key
    - authorization

sources:
  example_jsonl:
    type: jsonl
    path: logs.jsonl
    field_map:
      timestamp: ts
      level: severity
      message: msg
      logger: logger_name
      request_id: req_id
      trace_id: trace
      job_id: job
